<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CPS TechLabs Invoice</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    padding: 30px;
}

.invoice-container {
    max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* Header */
.logo {
    margin-bottom: 6px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.logo img {
    height: 90px;
    width: auto;
    display: block;
}

.company-info {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
}

.meta {
    text-align: right;
    font-size: 14px;
}

.meta .reg {
    font-size: 12px;
    color: #666;
    margin-bottom: 10px;
}

/* Section */
.section {
    margin-top: 30px;
}

.section h3 {
    margin-bottom: 8px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #1e3a8a;
    color: #fff;
    padding: 12px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

input {
    width: 100%;
    border: none;
    outline: none;
}

/* Buttons */
.btn {
    margin-top: 15px;
    padding: 10px 15px;
    background: #1e3a8a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Total */
.total-box {
    margin-top: 20px;
    text-align: right;
    font-size: 18px;
    font-weight: bold;
}

/* Footer */
.footer {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
}

.gst {
    font-style: italic;
    color: #777;
}

</style>

</head>

<body>

<div class="invoice-container">

    <!-- HEADER -->
    <div class="header">
        <div>
            <div class="logo">
                <img src="logo.svg" alt="CPS TechLabs Logo">
            </div>

            <div class="company-info">
                CPS TechLabs<br>
                cpstechlabs.com<br>
                support@cpstechlabs.com
            </div>
        </div>

        <div class="meta">
            <div class="reg">
                Reg No: UDYAM-UP-03-0143116
            </div>
            <div><strong>Invoice #:</strong> <span id="invoiceNo"></span></div>
            <div><strong>Date:</strong> <span id="date"></span></div>
        </div>
    </div>

    <!-- BILL TO -->
    <div class="section">
        <h3>Bill To</h3>
        <input type="text" placeholder="Client Name">
    </div>

    <!-- TABLE -->
    <table id="invoiceTable">
        <thead>
            <tr>
                <th>Item Description</th>
                <th>Qty</th>
                <th>Rate (₹)</th>
                <th>Amount (₹)</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Service/Product"></td>
                <td><input type="number" value="1" oninput="calculateTotal()"></td>
                <td><input type="number" value="0" oninput="calculateTotal()"></td>
                <td class="amount">0</td>
                <td><button onclick="deleteRow(this)">X</button></td>
            </tr>
        </tbody>
    </table>

    <button class="btn" onclick="addRow()">+ Add Item</button>

    <!-- TOTAL -->
    <div class="total-box">
        Total: ₹ <span id="totalAmount">0.00</span>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="gst">GST not applicable</div>
        <div>Thank you for your business</div>
    </div>

    <button class="btn" onclick="window.print()">Download / Print</button>

</div>

<script>

// Auto Invoice Number + Date
document.getElementById("invoiceNo").innerText = "CPS-" + Date.now().toString().slice(-5);
document.getElementById("date").innerText = new Date().toLocaleDateString();

// Add Row
function addRow() {
    let table = document.getElementById("invoiceTable").getElementsByTagName('tbody')[0];
    let row = table.insertRow();

    row.innerHTML = `
        <td><input type="text" placeholder="Service/Product"></td>
        <td><input type="number" value="1" oninput="calculateTotal()"></td>
        <td><input type="number" value="0" oninput="calculateTotal()"></td>
        <td class="amount">0</td>
        <td><button onclick="deleteRow(this)">X</button></td>
    `;
}

// Delete Row
function deleteRow(btn) {
    btn.closest("tr").remove();
    calculateTotal();
}

// Calculate
function calculateTotal() {
    let rows = document.querySelectorAll("#invoiceTable tbody tr");
    let total = 0;

    rows.forEach(row => {
        let qty = row.cells[1].querySelector("input").value || 0;
        let rate = row.cells[2].querySelector("input").value || 0;
        let amount = qty * rate;

        row.cells[3].innerText = amount.toFixed(2);
        total += amount;
    });

    document.getElementById("totalAmount").innerText = total.toFixed(2);
}

</script>

</body>
</html>
